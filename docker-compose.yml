services:
  # PostgreSQL database service
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: f1manager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yamaha 006
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Spring Boot application service
  app:
    build: .
    depends_on:
      - postgres
    environment:
      # Override the datasource URL to use the Docker service name
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/f1manager
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: yamaha 006
    ports:
      - "8080:8080"

volumes:
  pgdata: